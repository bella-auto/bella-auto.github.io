<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Внешнее кольцо фильтра -->
    <circle cx="32" cy="32" r="24" stroke="#0066CC" stroke-width="3" fill="none"/>
    <circle cx="32" cy="32" r="20" fill="#0099FF" opacity="0.2"/>
    
    <!-- Внутренние детали фильтра -->
    <circle cx="32" cy="32" r="16" stroke="#0066CC" stroke-width="2" fill="white"/>
    
    <!-- Фильтрующий элемент (гофрированная структура) -->
    <g>
        <path d="M24 32 L28 28 L28 36 Z" fill="#0066CC" opacity="0.6"/>
        <path d="M28 32 L32 28 L32 36 Z" fill="#0066CC" opacity="0.4"/>
        <path d="M32 32 L36 28 L36 36 Z" fill="#0066CC" opacity="0.6"/>
        <path d="M36 32 L40 28 L40 36 Z" fill="#0066CC" opacity="0.4"/>
    </g>
    
    <!-- Центральное отверстие -->
    <circle cx="32" cy="32" r="6" fill="#0066CC"/>
    <circle cx="32" cy="32" r="4" fill="white"/>
    
    <!-- Резьба (боковые линии) -->
    <g opacity="0.8">
        <line x1="14" y1="24" x2="18" y2="26" stroke="#0066CC" stroke-width="2"/>
        <line x1="14" y1="28" x2="18" y2="30" stroke="#0066CC" stroke-width="2"/>
        <line x1="14" y1="32" x2="18" y2="32" stroke="#0066CC" stroke-width="2"/>
        <line x1="14" y1="36" x2="18" y2="34" stroke="#0066CC" stroke-width="2"/>
        <line x1="14" y1="40" x2="18" y2="38" stroke="#0066CC" stroke-width="2"/>
        
        <line x1="50" y1="24" x2="46" y2="26" stroke="#0066CC" stroke-width="2"/>
        <line x1="50" y1="28" x2="46" y2="30" stroke="#0066CC" stroke-width="2"/>
        <line x1="50" y1="32" x2="46" y2="32" stroke="#0066CC" stroke-width="2"/>
        <line x1="50" y1="36" x2="46" y2="34" stroke="#0066CC" stroke-width="2"/>
        <line x1="50" y1="40" x2="46" y2="38" stroke="#0066CC" stroke-width="2"/>
    </g>
    
    <!-- Стрелки потока (вход/выход) -->
    <g>
        <path d="M32 8 L32 12 M29 10 L32 8 L35 10" stroke="#0099FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 56 L32 52 M29 54 L32 56 L35 54" stroke="#0099FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Блики -->
    <path d="M38 20 L42 24" stroke="white" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <path d="M20 20 L24 24" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>